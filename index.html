<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Smoke Garden - Mecânica Especializada 2 Tempos</title>
    <meta name="description" content="Mecânica especializada em motores 2 tempos. Orçamentos online, produtos e serviços de qualidade." />
    
    <!-- Controle de PWA por domínio -->
    <script>
      (function() {
        const hostname = window.location.hostname;
        const isPublicDomain = hostname === 'www.smokegarden.com.br' || hostname === 'smokegarden.com.br';
        
        if (!isPublicDomain) {
          // Domínio administrativo (vercel.app) - ativa PWA
          const link = document.createElement('link');
          link.rel = 'manifest';
          link.href = '/manifest.json';
          document.head.appendChild(link);
          console.log('✅ PWA ativado para domínio:', hostname);
        } else {
          // Domínio público - desativa PWA completamente
          console.log('🌐 Domínio público - PWA desativado');
          
          // Remove qualquer metatag de PWA
          const themeColor = document.querySelector('meta[name="theme-color"]');
          if (themeColor) themeColor.remove();
          
          const appleCapable = document.querySelector('meta[name="apple-mobile-web-app-capable"]');
          if (appleCapable) appleCapable.remove();
        }
      })();
    </script>
    
    <!-- OneSignal para notificações push -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(function(OneSignal) {
        OneSignal.init({
          appId: "0f70a363-cb11-4ab4-82a9-3941f5e8c358",
          safari_web_id: "",
          notifyButton: {
            enable: true,
          },
          allowLocalhostAsSecureOrigin: true,
        });
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
